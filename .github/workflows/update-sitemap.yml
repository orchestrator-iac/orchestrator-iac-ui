name: Update Sitemap

on:
  schedule:
    # Runs every day at 00:00 UTC — adjust cron as needed
    # Examples:
    #   every 6 hours:  '0 */6 * * *'
    #   every day:      '0 0 * * *'
    #   every Sunday:   '0 0 * * 0'
    - cron: "0 0 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sitemap:
    name: Generate and commit sitemap.xml
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Generate sitemap
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
        run: node scripts/generate-sitemap.mjs
        working-directory: orchestrator-iac-ui

      - name: Commit and push sitemap (if changed)
        working-directory: orchestrator-iac-ui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git

          git add public/sitemap.xml

          # Only commit if anything changed
          if git diff --cached --quiet; then
            echo "sitemap.xml is up to date — no commit needed."
          else
            git commit -m "chore: update sitemap.xml [skip ci]"
            git push origin HEAD:main
          fi
